<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro de Vagas</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    
    <body>
        <div class="container">
        <h1>Cadastro de Reserva de Vagas</h1>

        <nav class="menu">
            <div class="botoes">
            <a href="index.html">Listar Vagas</a>
            <a href="cadastro.html">Cadastrar Reserva</a>
            </div>
        </nav>

        <form id="formCadastro" class="formulario">
            <h2>Dados do Veículo</h2>

            <div class="campo">
            <label>Placa:</label>
            <input type="text" id="placa" style="text-transform: uppercase;" required>
            </div>

            <div class="campo">
            <label>Modelo:</label>
            <input type="text" id="modelo" required>    
            </div>

            <div class="campo">
            <label>Cor:</label>
            <input type="text" id="cor" required>
            </div>  

            <h2>Dados do Proprietário</h2>
            
            <div class="campo">
            <label>Nome do proprietário:</label>
            <input type="text" id="nome" required>
            </div>

            <div class="campo">
            <label>Apartamento:</label>
            <input type="number" id="apartamento" required>
            </div>

            <div class="campo">
            <label>Bloco:</label>
            <input type="text" id="bloco" required>
            </div>

            <h2>Vaga</h2>      

            <div class="campo">
            <label>Número da vaga:</label>
            <input type="number" id="vaga" required>
            </div>

            <button type="submit" class="btnSalvar">Salvar Reserva</button>
        </form>

        <script src="js/cadastro.js"></script>
        </div>
        <footer>
            <p>Sistema de Controle de Vagas de Estacionamento</p>
            <p>Desenvolvido por Vinícius Moraes Lago</p>
            <p>Curso de Análise e Desenvolvimento de Sistemas</p>
            <p>© 2026</p>
        </footer>
    </body>
</html>
