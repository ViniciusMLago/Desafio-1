<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Cadastro de Vagas</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    
    <body>
        <h1>Cadastro de Reserva de Vagas</h1>

        <nav class="menu">
            <a href="index.html">Listar Vagas</a>
            <a href="cadastro.html">Cadastrar Reserva</a>
        </nav>

        <form id="formCadastro">
            <label>Placa:</label>
            <input type="text" id="placa" required>

            <label>Nome do proprietário:</label>
            <input type="text" id="nome" required>

            <label>Apartamento:</label>
            <input type="number" id="apartamento" required>

            <label>Bloco:</label>
            <input type="text" id="bloco" required>

            <label>Modelo:</label>
            <input type="text" id="modelo" required>

            <label>Cor:</label>
            <input type="text" id="cor" required>

            <label>Número da vaga:</label>
            <input type="number" id="vaga" required>

            <button type="submit">Salvar</button>
        </form>

        <script src="js/cadastro.js"></script>
    </body>
</html>
